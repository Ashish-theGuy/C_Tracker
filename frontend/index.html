<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerala Crowd Flow - Realtime Density Map</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="styles.css?v=2">
</head>

<body>
    <div id="app-container">
        <!-- Sidebar for Map Controls and City Info -->
        <aside id="sidebar" class="glass-panel">
            <header>
                <h1>Kerala Crowd Flow</h1>
                <p>Real-time Tourist Density Tracker</p>
            </header>

            <div class="stats-overview">
                <div class="stat-box">
                    <span class="stat-value" id="total-tracked">0</span>
                    <span class="stat-label">Cities Tracked</span>
                </div>
                <div class="stat-box">
                    <span class="stat-value" id="overall-status">-</span>
                    <span class="stat-label">Overall Status</span>
                </div>
            </div>

            <div class="cities-list-container">
                <h3>Locations</h3>
                <ul id="cities-list" class="styled-list">
                    <!-- Populated by JS -->
                </ul>
            </div>

            <button id="refresh-btn" class="primary-btn">Refresh Data</button>
        </aside>

        <!-- The Map -->
        <main id="map-container">
            <div id="map"></div>
        </main>

        <!-- Live stream modal -->
        <div id="live-modal" class="modal-overlay" style="display:none;">
            <div class="modal-content glass-panel">
                <button class="modal-close" id="live-modal-close">✕</button>
                <h3 id="live-modal-title">Live Camera Feed</h3>
                <div class="live-stream-wrapper">
                    <img id="live-stream-img" src="" alt="Live stream" />
                </div>
                <div class="modal-footer">
                    <span id="live-modal-stats" class="pill-badge">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="app.js?v=2"></script>
</body>

</html>
